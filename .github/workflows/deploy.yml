
      name: Automated Deployment to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploying to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cicd-project1
            git pull origin main
            sudo docker stop my-app-container || true
            sudo docker rm my-app-container || true
            sudo docker build -t my-cicd-app .
            sudo docker run -d --name my-app-container -p 3000:3000 my-cicd-app
