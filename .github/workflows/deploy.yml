name: CI/CD Deploy to EC2

on:
  push:
    branches: [ main ] # Agar aapka branch master hai toh yahan master likhna

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Stop Existing Container
        run: docker stop my-web-container 2>/dev/null || true && docker rm my-web-container 2>/dev/null || true

      - name: Build Docker Image
        run: docker build -t my-web-app:latest .

      - name: Run New Container
        run: docker run -d --name my-web-container -p 8080:80 my-web-app:latest
